name: "build-linux-factory"
description: "Builds an image from a linux factory"
branding:
  icon: "monitor"
  color: "orange"

inputs:
  path:
    description: "Path of the linux factory under $GITHUB_WORKSPACE. If no path is supplied, $GITHUB_WORKSPACE will act as the working build directory."
    required: false

runs:
  using: "composite"
  steps:
    - name: Update dependencies
      shell: bash
      run: sudo apt-get update

    - name: Install non-cacheable dependencies
      shell: bash
      run: |
        echo "sudo apt-get install -y \
                imagemagick"

    - name: Install cacheable dependencies
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: imagemagick make git git-lfs grub-emu live-build python3 python3-pip jq virtualenv yq sudo
        execute_install_scripts: true

    # Setup Poetry from `https://github.com/snok/install-poetry?tab=readme-ov-file#testing`
    - name: Save Python version
      id: python
      shell: bash
      run: echo "version=$(python3 -c 'import sys; print(sys.version.split()[0])')" >> "$GITHUB_OUTPUT"

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        virtualenvs-create: true
        virtualenvs-in-project: true
        virtualenvs-path: .venv
        installer-parallel: true
        plugins: | # Required for Linux Factory
          poetry-plugin-export

    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v4
      with:
        path: ./${{ inputs.path }}/.venv
        key: venv-${{ runner.os }}-${{ steps.python.outputs.version }}-${{ hashFiles('**/poetry.lock') }}

    - name: Install dependencies
      working-directory: ./${{ inputs.path }}
      shell: bash
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --no-root

    - name: Activate virtualenv # From https://stackoverflow.com/a/74669486
      working-directory: ./${{ inputs.path }}
      shell: bash
      run: |
        . .venv/bin/activate
        echo PATH=$PATH >> $GITHUB_ENV

    - name: Live Build
      working-directory: ./${{ inputs.path }}
      shell: bash
      run: sudo env "PATH=$PATH" make build
