name: "build-linux-factory"
description: "Builds an image from a linux factory"
branding:
  icon: "monitor"
  color: "orange"

runs:
  using: "composite"
  steps:
    - name: Update dependencies
      shell: bash
      run: sudo apt-get update

    - name: Install dependencies
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: imagemagick make git git-lfs grub-emu live-build python3 python3-pip jq virtualenv yq sudo

    # Setup Poetry from `https://github.com/snok/install-poetry?tab=readme-ov-file#testing`
    - name: Save Python version
      id: python
      shell: bash
      run: echo "version=$(python3 -c 'import sys; print(sys.version.split()[0])')" >> "$GITHUB_OUTPUT"

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        virtualenvs-create: true
        virtualenvs-in-project: true
        virtualenvs-path: .venv
        installer-parallel: true

    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v4
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ steps.python.outputs.version }}-${{ hashFiles('**/poetry.lock') }}

    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --no-root

    - name: Install project
      run: poetry install --no-interaction

    - name: Live Build
      shell: bash
      run: sudo make build
