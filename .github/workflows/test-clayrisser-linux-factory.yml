run-name: Test build-linux-factory v2 action on clayrisser's linux factory

on:
  workflow_dispatch:
  push:
    branches: 
      - releases/v2

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize build space
        uses: AdityaGarg8/remove-unwanted-software@v2
        with:
          remove-android: 'true'
          remove-codeql: 'true'

      - uses: actions/checkout@v5
        with:
          repository: 'clayrisser/linux-factory'
          path: linux-factory
          lfs: true

      - name: Cleanup and check broken example overlays
        run: | 
          rm -r $GITHUB_WORKSPACE/linux-factory/overlays/example
          ls $GITHUB_WORKSPACE/linux-factory/overlays

      - name: Build Linux Factory
        uses: cnshing/build-linux-factory@v2/refactor-republish-ghcr # TODO: Update to v2 once it is stable
        with:
          path: linux-factory
          distribution-base: bookworm # Current clayrisser project is based on bookworm

      - uses: actions/upload-artifact@v4
        with:
          name: clayrisser-iso
          path: ${{ github.workspace }}/linux-factory/.build/lb/*.iso
      
