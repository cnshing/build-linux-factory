run-name: Test action ver. @${{ inputs.branch }} on cnshing's debian live-cd basic build

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Linux Factory target test branch"
        required: false
        default: "v2"
  push:
    branches: 
      - releases/v2

jobs:
  build:
    runs-on: ubuntu-24.04 # This version should be compatiable with cnshing debian-livecd
    steps:

      - uses: actions/checkout@v6
        with:
          repository: 'cnshing/debian-livecd'
          ref: v0.2.0 # Basic build tag
          path: debian-livecd
          lfs: true

      - name: Build cnshing Minimum Debian Live-CD
        uses: jenseng/dynamic-uses@v1
        with:
          uses: cnshing/build-linux-factory@${{ inputs.branch }}
          with: |
            path: debian-livecd
  
      - uses: actions/upload-artifact@v4
        with:
          name: cnshing-iso
          path: ${{ github.workspace }}/debian-livecd/.build/lb/*.iso
      
